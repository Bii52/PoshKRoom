[build]
  command = "echo 'Deploying frontend only'"
  publish = "."

# IMPORTANT: Set environment variable for backend URL
# Set this in Netlify Dashboard → Site Settings → Environment Variables
# Variable name: REACT_APP_BACKEND_URL or BACKEND_URL
# Example value: https://poshkroom-backend.up.railway.app

# Profile/detail pages - route to profile.html
[[redirects]]
  from = "/:slug"
  to = "/profile.html"
  status = 200
  conditions = {role = ["none"]}
  
# Rewrite for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
