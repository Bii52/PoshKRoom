[build]
  command = "echo 'Deploying frontend only'"
  publish = "."

# Redirect API calls to backend server
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Static file routing - serve specific files
[[redirects]]
  from = "/admin-*"
  to = "/admin-:splat"
  status = 200

# Profile/detail pages - route to profile.html
[[redirects]]
  from = "/:slug"
  to = "/profile.html"
  status = 200
  conditions = {role = ["none"]}
  
# Rewrite for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
